<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Smart Routine &amp; Product Advisor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <div class="header-top">
          <button id="rtlToggle" class="rtl-toggle-btn" aria-label="Toggle RTL layout">
            <i class="fa-solid fa-language"></i> RTL
          </button>
        </div>
        <div class="title-container">
          <img src="img/loreal-logo.png" alt="L'Oréal Logo" class="logo" />
          <h1 class="site-title">Smart Routine Builder</h1>
          <div class="brand-line"></div>
        </div>
      </header>

      <!-- Category & Search Filters -->
      <div class="filters-section">
        <div class="search-section">
          <select id="categoryFilter">
            <option value="" disabled selected>Choose a Category</option>
            <option value="cleanser">Cleansers</option>
            <option value="moisturizer">Moisturizers & Treatments</option>
            <option value="haircare">Haircare</option>
            <option value="makeup">Makeup</option>
            <option value="hair color">Hair Color</option>
            <option value="hair styling">Hair Styling</option>
            <option value="men's grooming">Men's Grooming</option>
            <option value="suncare">Suncare</option>
            <option value="fragrance">Fragrance</option>
          </select>
        </div>
        <div class="search-bar-wrapper">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input 
            type="text" 
            id="productSearch" 
            placeholder="Search products by name or keyword…"
            autocomplete="off"
          />
        </div>
      </div>

      <!-- Products Grid -->
      <div id="productsContainer" class="products-grid"></div>

      <!-- Selected Products -->
      <div class="selected-products">
        <h2>Selected Products</h2>
        <div id="selectedProductsList" class="chips-container">
          <p class="no-selection-msg">
            <i class="fa-regular fa-hand-pointer"></i> 
            Click products above to add them to your routine.
          </p>
        </div>
        <div class="action-buttons">
          <button id="generateRoutine" class="generate-btn">
            <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Routine
          </button>
          <button id="clearAllSelections" class="clear-all-btn" style="display: none;">
            Clear All
          </button>
        </div>
      </div>

      <!------- Chat Area ------->
      <section class="chatbox">
        <h2>Let's Build Your Routine</h2>
        
        <div class="chat-controls">
          <button type="button" id="webSearchToggle" class="web-search-btn" title="Toggle web search for current info">
            <i class="fa-solid fa-globe"></i> Search Web: Off
          </button>
        </div>

        <div id="chatWindow" class="chat-window">
          <div class="placeholder-message">
            Your personalized routine will appear here.
          </div>
        </div>

        <form id="chatForm" class="chat-form">
          <label for="userInput" class="visually-hidden">Message</label>
          <input
            id="userInput"
            name="userInput"
            type="text"
            placeholder="Ask me about products or routines…"
            autocomplete="off"
            required
          />
          <button type="submit" id="sendBtn">
            <i class="fa-solid fa-paper-plane"></i>
            <span class="visually-hidden">Send</span>
          </button>
        </form>
      </section>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2025 L'Oréal. All rights reserved.</p>
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <!-- Removed secrets.js as per requirements -->
    <script src="script.js"></script>
  </body>
</html>
